<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Vocabulary Review</title>

    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <script>
        const ankiSentenceUrl = "ankiSentence";

        $(document).ready(function() {
            const imageHintButton = $('#image-hint-button');
            const imageHintStatus = $('#image-hint-status');
            const imageHintResult = $('#image-hint-result');
            const imageHintImg = $('#image-hint-img');

            // Fetch the German sentence for the current word
            $.ajax({
                url: ankiSentenceUrl,
                method: 'GET',
                timeout: 30000,
                success: function(data) {
                    $('#dynamic-anki-sentence').text(data);
                    imageHintButton.prop('disabled', false);
                    // Kick off background prefetch of translations while the user reviews
                    $.ajax({
                        url: 'anki_prefetch',
                        method: 'POST',
                        success: function(_) {},
                        error: function(err) {
                            console.error('Error starting prefetch:', err);
                        }
                    });
                },
                error: function(err) {
                    const response = err.responseText || 'Could not load sentence. Please restart practice from the home page.';
                    $('#dynamic-anki-sentence').text(response);
                    console.error('Error fetching Anki sentence:', err);
                }
            });

            imageHintButton.on('click', function() {
                const sentence = $('#dynamic-anki-sentence').text();
                imageHintButton.prop('disabled', true);
                imageHintStatus.text('Generating image hint...');
                imageHintResult.hide();
                imageHintImg.attr('src', '');

                $.ajax({
                    url: 'anki_image_hint',
                    method: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({ sentence: sentence }),
                    success: function(data) {
                        if (data.ok && data.image_url) {
                            imageHintImg.attr('src', data.image_url);
                            imageHintResult.show();
                            imageHintStatus.text('');
                        } else {
                            imageHintStatus.text(data.error || 'Could not generate image hint.');
                        }
                    },
                    error: function(err) {
                        const response = err.responseJSON || {};
                        imageHintStatus.text(response.error || 'Could not generate image hint.');
                    },
                    complete: function() {
                        imageHintButton.prop('disabled', false);
                    }
                });
            });
        });
    </script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 1em;
            background: linear-gradient(to bottom right, #fffefc, #fdf6e3);
            color: #1a202c;
        }

        h1 {
            font-size: 30px;
            text-align: center;
            color: #000000;
            margin-bottom: 1em;
            text-shadow: 1px 1px #fbbf24;
        }

        p {
            font-size: 26px;
            text-align: center;
            margin: 0.8em 0;
        }

        .custom-button {
            font-size: 18px;
            font-weight: bold;
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            background-color: #fbbf24; /* Gold */
            color: #000;
            display: block;
            margin: 1.5em auto;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
            box-shadow: 0 3px 6px rgba(0,0,0,0.15);
        }

        .custom-button:hover {
            background-color: #ef4444; /* Red */
            color: white;
            transform: scale(1.05);
        }

        .review-actions {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 14px;
            margin-top: 1.5em;
        }

        .review-actions form {
            margin: 0;
        }

        .hint-status {
            min-height: 24px;
            margin: 1em 0 0;
            color: #ef4444;
            font-size: 18px;
            font-weight: 700;
        }

        .image-hint-result {
            display: none;
            margin-top: 1.25em;
            text-align: center;
        }

        .image-hint-result img {
            width: min(100%, 520px);
            aspect-ratio: 1 / 1;
            object-fit: contain;
            border-radius: 14px;
            border: 1px solid rgba(0,0,0,0.16);
            box-shadow: 0 12px 28px rgba(0,0,0,0.18);
            background: #fff;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 24px;
            }

            p {
                font-size: 22px;
            }

            .custom-button {
                width: 90%;
                font-size: 16px;
            }
        }
    </style>
    {% include "_theme.html" %}
</head>
<body>
    <main class="page-wrapper">
    <section class="content-card">

    <h1>Vocabulary Review</h1>

    <p class="vocab-focus">{{ result.number }}: <strong>{{ result.wort }}</strong></p>

    <p id="dynamic-anki-sentence">Loading sentence…</p>

    <div class="review-actions">
        <form method="POST" action="ankiTranslate">
            <button type="submit" class="custom-button">Translation</button>
        </form>
        {% if result.show_image_hint %}
        <button type="button" id="image-hint-button" class="custom-button" disabled>Image Hint</button>
        {% endif %}
    </div>

    {% if result.show_image_hint %}
    <p id="image-hint-status" class="hint-status"></p>
    <div id="image-hint-result" class="image-hint-result">
        <img id="image-hint-img" alt="Image hint for the German sentence">
    </div>
    {% endif %}

    </section>
    </main>
</body>
</html>
